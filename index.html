<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kaboom Platform Game - Stages</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#222;
}
canvas{
    display:block;
    margin:auto;
}
</style>
<div id="controls">
    <button id="left">◀</button>
    <button id="jump">⬆</button>
    <button id="right">▶</button>
</div>

<style>
#controls{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 30px;
    box-sizing:border-box;
}

#controls button{
    width:80px;
    height:80px;
    font-size:32px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.5);
    color:white;
}
</style>

</head>
<body>

<script type="module">

import kaboom from "https://unpkg.com/kaboom/dist/kaboom.mjs";

kaboom({
    width:900,
    height:600,
    background:[135,206,235],
});

// Reduced gravity for higher jumps
setGravity(1000);

let stage = 1;

scene("menu",()=>{

    add([
        text("KABOOM PLATFORM GAME",{
            size:40,
        }),
        pos(180,120),
    ]);

    add([
        text("Press ENTER to Start",{
            size:28,
        }),
        pos(250,250),
    ]);

    add([
        text("Arrow Keys = Move\nSpace = Jump",{
            size:22,
        }),
        pos(250,330),
    ]);

    onKeyPress("enter",()=>{
        stage = 1;
        go("game");
    });
    onTouchStart(() => {
    stage = 1;
    go("game");
});

onClick(() => {
    stage = 1;
    go("game");
});

});

scene("game",()=>{
    let moveLeft = false;
let moveRight = false;

const leftBtn = document.getElementById("left");
const rightBtn = document.getElementById("right");
const jumpBtn = document.getElementById("jump");

leftBtn.ontouchstart = ()=> moveLeft = true;
leftBtn.ontouchend = ()=> moveLeft = false;

rightBtn.ontouchstart = ()=> moveRight = true;
rightBtn.ontouchend = ()=> moveRight = false;



    // Player settings
    let speed = 320;
    let jumpPower = 650;

    if(stage==2){
        speed = 380;
        jumpPower = 650;
    }

    if(stage==3){
        speed = 450;
        jumpPower = 650;
    }

    if(stage==4){
    speed = 500;
    jumpPower = 680;
}

if(stage==5){
    speed = 550;
    jumpPower = 700;
}

    // Player
    const player = add([
        rect(40,40),
        pos(50,100),
        area(),
        body(),
        color(0,0,255),
    ]);
    jumpBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();

    if (player.isGrounded()) {
        player.jump(jumpPower);
    }
});

onUpdate(()=>{
    if(moveLeft){
        player.move(-speed,0);
    }
    if(moveRight){
        player.move(speed,0);
    }
});

    // Ground
    add([
        rect(900,50),
        pos(0,550),
        area(),
        body({isStatic:true}),
        color(0,180,0),
    ]);

    // =========================
    // Different Layout Per Stage
    // =========================

    let platforms = [];
    let goalPos = [840,150];

    if(stage == 1){

        platforms = [
            [180,450],
            [350,380],
            [520,300],
            [700,220]
        ];

        goalPos = [840,150];

    }

    else if(stage == 2){

        platforms = [
            [120,470],
            [280,330],
            [120,210],
            [420,170],
            [650,280],
            [760,150]
        ];

        goalPos = [830,60];

    }

    else if(stage == 3){

        platforms = [
            [120,470],
            [320,470],
            [520,390],
            [320,280],
            [550,180],
            [180,120],
            [720,90]
        ];

        goalPos = [760,20];

    }

    else if(stage == 4){

    // Very Hard
    platforms = [
        [80,470],
        [250,420],
        [430,340],
        [650,260],
        [480,170],
        [260,90],
        [580,60],
        [760,140]
    ];

    goalPos = [840,40];

}

else if(stage == 5){

    // Extreme
    platforms = [
        [80,500],
        [220,420],
        [390,480],
        [550,350],
        [380,250],
        [170,170],
        [420,90],
        [650,140],
        [770,40]
    ];

    goalPos = [840,5];

}

    // Create Platforms
    platforms.forEach(p=>{

        add([
            rect(120,20),
            pos(p[0],p[1]),
            area(),
            body({isStatic:true}),
            color(139,69,19),
        ]);

    });

    // Goal
    const goal = add([
        rect(40,70),
        pos(goalPos[0],goalPos[1]),
        area(),
        color(255,255,0),
        "goal",
    ]);

    // UI
    add([
        text("Stage : "+stage,{
            size:24,
        }),
        pos(20,20),
    ]);

    add([
        text("Arrow Keys = Move | Space = Jump",{
            size:18,
        }),
        pos(20,50),
    ]);

    // Controls
    onKeyDown("left",()=>{
        player.move(-speed,0);
    });

    onKeyDown("right",()=>{
        player.move(speed,0);
    });

    // WASD Controls
onKeyDown("a",()=>{
    player.move(-speed,0);
});

onKeyDown("d",()=>{
    player.move(speed,0);
});

    onKeyPress("space",()=>{

        if(player.isGrounded()){
            player.jump(jumpPower);
        }

    });

    onKeyPress("w",()=>{

    if(player.isGrounded()){
        player.jump(jumpPower);
    }

});

    // Next Stage
    player.onCollide("goal",()=>{

    stage++;

    if(stage > 5){
        go("win");
    }else{
        go("game");
    }

});

});

scene("win",()=>{

    add([
        text("🎉 Congratulations!\nYou Completed All Stages!",{
            size:36,
            align:"center"
        }),
        pos(180,220),
    ]);

    // RESTART Button
    const restart = add([
        text("RESTART",{
            size:28,
        }),
        pos(320,350),
        area(),
    ]);

    // Touch / Click se restart
    restart.onClick(() => {
        stage = 1;
        go("game");
    });

    // ENTER key se restart
    onKeyPress("enter",()=>{
        stage = 1;
        go("game");
    });


    const home = add([
        text("HOME MENU",{
            size:22,
        }),
        pos(320,400),
        area(),
    ]);

    // Home button touch/click
    home.onClick(() => {
        go("menu");
    });

    // H key se home
    onKeyPress("h",()=>{
        go("menu");
    });

});

go("menu");

</script>

</body>
</html>
